name: Flutter APK Build & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v3
        with:
          name: flutter-network-diagnostics-apk
          path: build/app/outputs/flutter-app.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          files: build/app/outputs/flutter-app.apk
          body: |
            ## Flutter Network Diagnostics v${{ github.run_number }}
            
            ### Features
            - TCP Port Scanner
            - DNS Lookup
            - Cryptography & Hashing (MD5, SHA256, Base64)
            - Device Information
            
            ### Installation
            1. Download APK from assets
            2. Enable "Unknown Sources" in Android settings
            3. Install the APK
            
            ### Requirements
            - Android 7.0 or higher
            - Non-rooted device
