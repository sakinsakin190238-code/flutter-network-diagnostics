name: flutter_network_diagnostics
description: Production-ready Flutter network diagnostics for non-rooted Android devices.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.3.1
  http: ^1.1.0
  crypto: ^3.0.3
  device_info_plus: ^9.1.1
  permission_handler: ^11.4.4
  provider: ^6.0.0
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
