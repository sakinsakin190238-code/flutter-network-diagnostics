name: flutter_network_diagnostics
description: A Cyberpunk-themed advanced network diagnostics utility for Flutter Android.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Networking and Diagnostics
  ping_discover_network: ^3.0.0
  network_info_plus: ^4.1.0
  connectivity_plus: ^5.0.0
  http: ^1.1.0
  dio: ^5.3.0
  
  # Cryptography and Hashing
  crypto: ^3.0.3
  convert: ^3.1.1
  pointycastle: ^3.7.3
  
  # Device and System Info
  device_info_plus: ^9.1.1
  android_id: ^0.2.1
  
  # UI and Theme
  google_fonts: ^6.1.0
  flutter_animate: ^4.1.1
  
  # SSL/TLS Certificate Inspection
  tls_certificate_handler: ^1.0.0
  
  # JSON serialization
  json_annotation: ^4.8.1
  
  # State Management
  provider: ^6.1.0
  
  # Date/Time
  intl: ^0.19.0
  
  # Utilities
  uuid: ^4.0.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/
  
  fonts:
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700
