name: flutter_network_diagnostics
description: Production-ready Flutter network diagnostics, security auditing, and system analysis for non-rooted Android devices with cyberpunk UI.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Networking & Diagnostics
  dio: ^5.3.1
  http: ^1.1.0
  
  # DNS & Network Resolution
  dns_client: ^2.3.1
  
  # Cryptography & Hashing
  crypto: ^3.0.3
  pointycastle: ^3.7.3
  
  # Device & System Info
  device_info_plus: ^9.1.1
  android_intent_plus: ^4.0.5
  
  # Permissions
  permission_handler: ^11.4.4
  
  # UI & Theme
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.0.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Utilities
  intl: ^0.19.0
  logger: ^2.0.1
  get_it: ^7.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
